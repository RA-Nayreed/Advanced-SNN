<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Advanced-SNN Brain Viewer</title>
  <link rel="stylesheet" href="styles.css">
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.166.1/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.166.1/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <main id="app-shell">
    <section id="scene-panel" aria-label="Brain activity scene">
      <canvas id="brain-canvas"></canvas>
      <div id="hud">
        <div>step <strong id="step-value">0</strong></div>
        <div>spikes <strong id="spike-value">0</strong></div>
        <div>events <strong id="event-value">0</strong></div>
      </div>
      <div id="toolbar" role="toolbar" aria-label="Playback controls">
        <button id="load-sample" title="Load bundled sample">◉</button>
        <button id="connect-live" title="Connect live stream">LIVE</button>
        <label class="file-button" title="Open snapshot file">
          ⌁
          <input id="snapshot-file" type="file" accept=".ndjson,.jsonl,.txt,application/x-ndjson">
        </label>
        <button id="play-pause" title="Play or pause">▶</button>
        <button id="step-back" title="Previous step">‹</button>
        <button id="step-forward" title="Next step">›</button>
        <input id="frame-slider" title="Frame" type="range" min="0" max="0" value="0">
        <select id="speed-select" title="Playback speed">
          <option value="250">0.25x</option>
          <option value="120" selected>0.5x</option>
          <option value="60">1x</option>
          <option value="30">2x</option>
        </select>
      </div>
    </section>
    <aside id="side-panel">
      <header>
        <h1>Brain Viewer</h1>
        <span id="frame-count">0 frames</span>
      </header>
      <section class="metrics-grid" aria-label="Metrics">
        <div><span>neurons</span><strong id="neurons-value">0</strong></div>
        <div><span>synapses</span><strong id="synapses-value">0</strong></div>
        <div><span>active</span><strong id="active-value">0</strong></div>
        <div><span>voltage</span><strong id="voltage-value">0.000</strong></div>
        <div><span>weight</span><strong id="learning-value">-</strong></div>
      </section>
      <section id="hpc-panel" aria-label="Scale view">
        <h2>Scale</h2>
        <div class="scale-row"><span>mode</span><select id="scale-mode"><option value="sampled">sampled</option><option value="aggregate">aggregate</option></select></div>
        <div class="scale-row"><span>events/step</span><strong id="events-step-value">0</strong></div>
        <div class="scale-row"><span>active</span><strong id="active-ratio-value">0%</strong></div>
        <canvas id="raster-canvas" width="280" height="96" aria-label="Spike raster"></canvas>
      </section>
      <section id="stimulus-panel" aria-label="Stimulus">
        <h2>Stimulus</h2>
        <div class="stimulus-row">
          <span>target</span><strong id="stim-target">none</strong>
        </div>
        <div class="stimulus-row">
          <span>gain</span><input id="stim-gain" type="range" min="0" max="1" step="0.05" value="0.45">
        </div>
      </section>
      <section id="region-list" aria-label="Regions"></section>
      <section id="selected-neuron" aria-label="Selected neuron">
        <h2>Microscope</h2>
        <dl>
          <div><dt>id</dt><dd id="selected-id">none</dd></div>
          <div><dt>type</dt><dd id="selected-kind">-</dd></div>
          <div><dt>region</dt><dd id="selected-region">-</dd></div>
          <div><dt>voltage</dt><dd id="selected-voltage">0.000</dd></div>
        </dl>
      </section>
      <section id="status-line" aria-live="polite">No snapshot loaded</section>
    </aside>
  </main>
  <script type="module" src="app.js"></script>
</body>
</html>
